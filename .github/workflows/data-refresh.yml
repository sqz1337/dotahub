name: Refresh Dota data

on:
  schedule:
    # Incremental refresh every hour except midnight, when the full refresh runs.
    - cron: "17 1-23 * * *"
      timezone: "Europe/Moscow"
    - cron: "0 0 * * *"
      timezone: "Europe/Moscow"
  workflow_dispatch:
    inputs:
      mode:
        description: Refresh mode
        required: true
        default: refresh
        type: choice
        options:
          - refresh
          - refresh_full

permissions:
  contents: write

concurrency:
  group: dota-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Update OpenDota data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: npm ci

      - name: Resolve refresh mode
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mode="${{ inputs.mode }}"
          elif [[ "${{ github.event.schedule }}" == "0 0 * * *" ]]; then
            mode="refresh_full"
          else
            mode="refresh"
          fi

          echo "script=data:${mode}" >> "$GITHUB_OUTPUT"
          echo "label=${mode}" >> "$GITHUB_OUTPUT"

      - name: Refresh OpenDota data
        env:
          OPENDOTA_API_KEY: ${{ secrets.OPENDOTA_API_KEY }}
        run: npm run "${{ steps.mode.outputs.script }}"

      - name: Verify production build
        run: npm run build

      - name: Commit and push updated data
        shell: bash
        run: |
          git add -- data/opendota.sqlite data/dashboard.json data/matches.json

          if git diff --cached --quiet; then
            echo "OpenDota returned no data changes. Nothing to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): automated ${{ steps.mode.outputs.label }}"
          git pull --rebase origin main
          git push origin HEAD:main
